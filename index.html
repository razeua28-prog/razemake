<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>RazeMake</title>

<link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300;400;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:"Comfortaa",sans-serif;
background:linear-gradient(#f6f6f6,#e7e7e7);
color:#222;
overflow-x:hidden;
}

canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

header{
text-align:center;
padding:70px 20px;
animation:fadeUp 1s;
}

@keyframes fadeUp{
from{opacity:0; transform:translateY(-40px); filter:blur(10px)}
to{opacity:1; transform:translateY(0); filter:blur(0)}
}

h1{
font-size:32px;
}

.lang{
position:absolute;
right:20px;
top:20px;
display:flex;
gap:10px;
}

.flag{
width:34px;
cursor:pointer;
border-radius:6px;
transition:.25s;
box-shadow:0 3px 10px rgba(0,0,0,0.15);
}

.flag:hover{
transform:scale(1.2);
}

.controls{
display:flex;
justify-content:center;
gap:15px;
margin-bottom:30px;
}

button{
padding:10px 16px;
border:none;
border-radius:12px;
background:#111;
color:white;
cursor:pointer;
font-family:"Comfortaa";
}

.library{
display:flex;
flex-wrap:wrap;
gap:28px;
justify-content:center;
padding:40px;
}

.card{

width:260px;

background:linear-gradient(
135deg,
rgba(255,255,255,0.75),
rgba(255,255,255,0.35)
);

backdrop-filter:blur(18px);

border-radius:22px;

padding:18px;

box-shadow:
0 20px 50px rgba(0,0,0,0.12),
inset 0 0 1px rgba(255,255,255,0.6);

transition:.3s;

}

.card:hover{
transform:translateY(-6px);
}

.card img{
width:100%;
border-radius:10px;
margin-bottom:8px;
}

input{
width:100%;
margin:4px 0;
padding:6px;
border-radius:8px;
border:1px solid #ccc;
font-family:"Comfortaa";
}

.readBtn{
margin-top:10px;
width:100%;
}

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
display:none;
background:rgba(0,0,0,.6);
justify-content:center;
align-items:center;
}

.modalBox{
background:white;
padding:30px;
border-radius:20px;
}

/* MOBILE */

@media (max-width:700px){

h1{font-size:22px}

.library{
padding:20px;
gap:20px;
}

.card{
width:90%;
max-width:340px;
}

.controls{
flex-direction:column;
align-items:center;
}

.lang{
top:10px;
right:10px;
}

.flag{
width:26px;
}

}

</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="lang">

<img src="https://flagcdn.com/w40/ru.png" class="flag" onclick="setLang('ru')">
<img src="https://flagcdn.com/w40/gb.png" class="flag" onclick="setLang('en')">
<img src="https://flagcdn.com/w40/ua.png" class="flag" onclick="setLang('ua')">

</div>

<header>

<h1 id="welcome">
Добро пожаловать в онлайн-библиотеку издательства RazeMake!
</h1>

</header>

<div class="controls">

<button onclick="adminLogin()">Войти как администратор</button>

<button id="addBtn" onclick="addBook()" style="display:none">
Добавить книгу
</button>

</div>

<div class="library" id="library"></div>

<div class="modal" id="reader">

<div class="modalBox">

<div id="files"></div>
<br>
<button onclick="closeReader()">Закрыть</button>

</div>

</div>

<script>

const ADMIN_PASSWORD="razemake2026"

let isAdmin=sessionStorage.getItem("razeAdmin")==="true"

let books=JSON.parse(localStorage.getItem("books")||"[]")

function save(){
localStorage.setItem("books",JSON.stringify(books))
}

function adminLogin(){

const p=prompt("Пароль администратора")

if(p===ADMIN_PASSWORD){

isAdmin=true
sessionStorage.setItem("razeAdmin","true")

document.getElementById("addBtn").style.display="inline-block"

render()

}else{

alert("Неверный пароль")

}

}

if(isAdmin){
document.getElementById("addBtn").style.display="inline-block"
}

function addBook(){

if(!isAdmin) return

books.push({

title:"Новая книга",
pages:"0",
languages:"RU",
illustrations:"Нет",
image:"",
files:["","",""]

})

save()
render()

}

function openReader(files){

let html=""

files.forEach(f=>{
if(f) html+=`<p><a href="${f}" target="_blank">Открыть файл</a></p>`
})

document.getElementById("files").innerHTML=html
reader.style.display="flex"

}

function closeReader(){
reader.style.display="none"
}

function render(){

let lib=document.getElementById("library")

lib.innerHTML=""

books.forEach((b,i)=>{

let card=document.createElement("div")
card.className="card"

if(isAdmin){

card.innerHTML=`

<input value="${b.title}" onchange="books[${i}].title=this.value;save()">

<input value="${b.pages}" onchange="books[${i}].pages=this.value;save()">

<input value="${b.languages}" onchange="books[${i}].languages=this.value;save()">

<input value="${b.illustrations}" onchange="books[${i}].illustrations=this.value;save()">

<input placeholder="URL картинки" value="${b.image}" onchange="books[${i}].image=this.value;save()">

<input placeholder="Файл 1" value="${b.files[0]}" onchange="books[${i}].files[0]=this.value;save()">

<input placeholder="Файл 2" value="${b.files[1]}" onchange="books[${i}].files[1]=this.value;save()">

<input placeholder="Файл 3" value="${b.files[2]}" onchange="books[${i}].files[2]=this.value;save()">

`

}else{

card.innerHTML=`

<img src="${b.image||'https://picsum.photos/300/400'}">

<h3>${b.title}</h3>

<p>Кол-во страниц: ${b.pages}</p>

<p>Доступные языки: ${b.languages}</p>

<p>Иллюстрации: ${b.illustrations}</p>

<button class="readBtn" onclick='openReader(${JSON.stringify(b.files)})'>
Читать
</button>

`

}

lib.appendChild(card)

})

}

render()

/* PARTICLES */

const canvas=document.getElementById("bg")
const ctx=canvas.getContext("2d")

function resize(){
canvas.width=window.innerWidth
canvas.height=window.innerHeight
}

resize()
window.addEventListener("resize",resize)

let shapes=[]

for(let i=0;i<50;i++){

shapes.push({

x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
size:14+Math.random()*18,
vx:(Math.random()-0.5)*1.5,
vy:(Math.random()-0.5)*1.5,
type:Math.floor(Math.random()*3)

})

}

let mouse={x:0,y:0}

document.addEventListener("mousemove",e=>{
mouse.x=e.clientX
mouse.y=e.clientY
})

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

shapes.forEach(s=>{

let dx=s.x-mouse.x
let dy=s.y-mouse.y
let dist=Math.sqrt(dx*dx+dy*dy)

if(dist<180){

s.vx+=dx*0.002
s.vy+=dy*0.002

}

s.x+=s.vx
s.y+=s.vy

if(s.x<0||s.x>canvas.width) s.vx*=-1
if(s.y<0||s.y>canvas.height) s.vy*=-1

const colors=[
"rgba(0,0,0,0.07)",
"rgba(100,100,100,0.06)",
"rgba(150,150,150,0.05)"
]

ctx.fillStyle=colors[s.type]

ctx.beginPath()

if(s.type===0){

ctx.arc(s.x,s.y,s.size,0,Math.PI*2)

}

if(s.type===1){

ctx.rect(s.x,s.y,s.size,s.size)

}

if(s.type===2){

ctx.moveTo(s.x,s.y)
ctx.lineTo(s.x+s.size,s.y)
ctx.lineTo(s.x+s.size/2,s.y+s.size)
ctx.closePath()

}

ctx.fill()

})

requestAnimationFrame(draw)

}

draw()

/* LANG */

const texts={

ru:"Добро пожаловать в онлайн-библиотеку издательства RazeMake!",
en:"Welcome to the RazeMake publishing online library!",
ua:"Ласкаво просимо до онлайн-бібліотеки видавництва RazeMake!"

}

function setLang(l){
document.getElementById("welcome").innerText=texts[l]
}

</script>

</body>
</html>
