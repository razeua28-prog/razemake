<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RazeMake Library</title>

<link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300;400;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>

<body>

<canvas id="bg"></canvas>

<header>

<h1 id="welcome"></h1>

<div class="lang-switch">

<span class="flag" data-lang="ru">🇷🇺</span>
<span class="flag" data-lang="en">🇬🇧</span>
<span class="flag" data-lang="ua">🇺🇦</span>

</div>

</header>

<section id="books" class="books"></section>

<div class="admin">

<button id="adminBtn"></button>

</div>

<div id="readerModal" class="modal">

<div class="modalContent">

<h2 id="modalTitle"></h2>

<div id="fileList"></div>

<button onclick="closeModal()">Close</button>

</div>

</div>

<script src="app.js"></script>

</body>
</html>
