<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>RazeMake Library</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300;400;600&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

</head>

<body>

<div id="bg3d"></div>

<button id="adminBtn" class="glassBtn">Admin</button>

<div class="flags">

<img src="https://flagcdn.com/w80/gb.png" data-lang="en">
<img src="https://flagcdn.com/w80/ru.png" data-lang="ru">
<img src="https://flagcdn.com/w80/ua.png" data-lang="ua">

</div>

<header>

<h1 id="welcome"></h1>

<input id="search" placeholder="Search books">

</header>

<section id="books"></section>

<div id="reader" class="modal">

<div class="modalBox">

<div id="fileList"></div>

<iframe id="viewer"></iframe>

<button onclick="closeReader()" class="glassBtn">Close</button>

</div>

</div>

<div id="adminPanel" class="modal">

<div class="modalBox">

<h2>Admin</h2>

<input id="bookTitle" placeholder="Title">
<input id="bookPages" placeholder="Pages">
<input id="bookImage" placeholder="Image URL">

<input id="ruLink" placeholder="Russian file">
<input id="enLink" placeholder="English file">
<input id="uaLink" placeholder="Ukrainian file">

<button onclick="addBook()" class="glassBtn">Add Book</button>

<div id="adminBooks"></div>

<button onclick="closeAdmin()" class="glassBtn">Close</button>

</div>

</div>

<script src="app.js"></script>
<script src="background.js"></script>

</body>
</html>
