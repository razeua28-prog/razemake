<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RazeMake Library</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>

<body>

<!-- серое свечение сверху -->
<div class="topGlow"></div>

<!-- 3D фон -->
<div id="bg3d"></div>

<!-- кнопка администратора -->
<button id="adminBtn" class="glassBtn">Admin</button>

<!-- языки -->
<div class="flags">
<img src="https://flagcdn.com/w80/gb.png" data-lang="en">
<img src="https://flagcdn.com/w80/ru.png" data-lang="ru">
<img src="https://flagcdn.com/w80/ua.png" data-lang="ua">
</div>

<header>
<h1 id="welcome"></h1>

<!-- поиск -->
<input id="search" placeholder="Search">

<!-- категории -->
<div class="categories">
<button onclick="filterCategory('all')" class="glassBtn">All</button>
<button onclick="filterCategory('poetry')" class="glassBtn">Poetry</button>
<button onclick="filterCategory('novel')" class="glassBtn">Novels</button>
</div>
</header>

<!-- карточки книг -->
<section id="books"></section>

<!-- модальное окно reader -->
<div id="reader" class="modal">
<div class="modalBox">
<div id="fileList"></div>
<iframe id="viewer"></iframe>
<button onclick="closeReader()" class="glassBtn">Close</button>
</div>
</div>

<!-- модальное окно админки -->
<div id="adminPanel" class="modal">
<div class="modalBox">
<h2>Admin Panel</h2>

<input id="title" placeholder="Title">
<input id="pages" placeholder="Pages">
<input id="category" placeholder="Category">
<input id="image" placeholder="Cover URL">

<input id="ru" placeholder="Russian file">
<input id="en" placeholder="English file">
<input id="ua" placeholder="Ukrainian file">

<button onclick="addBook()" class="glassBtn">Add / Update Book</button>

<div id="adminList"></div>
<button onclick="closeAdmin()" class="glassBtn">Close</button>
</div>
</div>

<script src="app.js"></script>
<script src="background.js"></script>
</body>
</html>
