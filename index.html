<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>RazeMake</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;600&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

</head>

<body>

<div class="topGlow"></div>

<div id="bg3d"></div>

<button id="adminBtn" class="glass">Admin</button>

<div class="flags">

<img src="https://flagcdn.com/w80/gb.png" data-lang="en">
<img src="https://flagcdn.com/w80/ru.png" data-lang="ru">
<img src="https://flagcdn.com/w80/ua.png" data-lang="ua">

</div>

<header>

<h1 id="welcome"></h1>

<input id="search" placeholder="Search">

<div class="categories">

<button onclick="filterCategory('all')" class="glass">All</button>
<button onclick="filterCategory('poetry')" class="glass">Poetry</button>
<button onclick="filterCategory('novel')" class="glass">Novels</button>

</div>

</header>

<section id="books"></section>

<div id="reader" class="modal">

<div class="modalBox">

<div id="fileList"></div>

<iframe id="viewer"></iframe>

<button onclick="closeReader()" class="glass">Close</button>

</div>

</div>

<div id="adminPanel" class="modal">

<div class="modalBox">

<h2>Admin</h2>

<input id="title" placeholder="Title">
<input id="pages" placeholder="Pages">
<input id="category" placeholder="Category">
<input id="image" placeholder="Cover URL">

<input id="ru" placeholder="Russian file">
<input id="en" placeholder="English file">
<input id="ua" placeholder="Ukrainian file">

<button onclick="addBook()" class="glass">Add</button>

<div id="adminList"></div>

<button onclick="closeAdmin()" class="glass">Close</button>

</div>

</div>

<script src="app.js"></script>
<script src="background.js"></script>

</body>
</html>
