<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>RazeMake</title>

<link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300;400;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="topGlow"></div>

<canvas id="bg"></canvas>

<button id="adminBtn">Admin</button>

<div class="flags">

<img src="https://flagcdn.com/w80/gb.png" data-lang="en">
<img src="https://flagcdn.com/w80/ru.png" data-lang="ru">
<img src="https://flagcdn.com/w80/ua.png" data-lang="ua">

</div>

<header>

<h1 id="welcome"></h1>

</header>

<section id="books"></section>

<div id="reader" class="modal">

<div class="modalBox">

<h2 id="modalTitle"></h2>

<div id="fileList"></div>

<button onclick="closeReader()">Close</button>

</div>

</div>

<div id="adminPanel" class="modal">

<div class="modalBox">

<h2>Admin panel</h2>

<input id="bookTitle" placeholder="Title">

<input id="bookPages" placeholder="Pages">

<input id="bookImage" placeholder="Cover image URL">

<input id="ruLink" placeholder="RU link">

<input id="enLink" placeholder="EN link">

<input id="uaLink" placeholder="UA link">

<button onclick="addBook()">Add book</button>

<div id="adminBooks"></div>

<button onclick="closeAdmin()">Close</button>

</div>

</div>

<script src="app.js"></script>

</body>
</html>
