<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>RazeMake</title>

<link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300;400;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:"Comfortaa",sans-serif;
background:linear-gradient(#f6f6f6,#e7e7e7);
color:#222;
overflow-x:hidden;
}

canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

header{
text-align:center;
padding:80px 20px;
animation:fadeUp 1s;
}

@keyframes fadeUp{
from{opacity:0; transform:translateY(-40px); filter:blur(10px)}
to{opacity:1; transform:translateY(0); filter:blur(0)}
}

h1{
font-size:32px;
}

/* кнопка администратора */

.adminBtn{
position:absolute;
left:20px;
top:20px;
padding:10px 16px;
}

/* флаги */

.lang{
position:absolute;
right:20px;
top:20px;
display:flex;
gap:14px;
}

.flag{
width:44px;
cursor:pointer;
border-radius:6px;
transition:.25s;
box-shadow:0 3px 10px rgba(0,0,0,0.15);
}

.flag:hover{
transform:scale(1.2);
}

.controls{
display:flex;
justify-content:center;
gap:15px;
margin-bottom:30px;
}

button{
padding:10px 16px;
border:none;
border-radius:12px;
background:#111;
color:white;
cursor:pointer;
font-family:"Comfortaa";
}

.library{
display:flex;
flex-wrap:wrap;
gap:28px;
justify-content:center;
padding:40px;
}

.card{

width:260px;

background:linear-gradient(
135deg,
rgba(255,255,255,0.75),
rgba(255,255,255,0.35)
);

backdrop-filter:blur(18px);

border-radius:22px;

padding:18px;

box-shadow:
0 20px 50px rgba(0,0,0,0.12),
inset 0 0 1px rgba(255,255,255,0.6);

transition:.3s;

}

.card:hover{
transform:translateY(-6px);
}

.card img{
width:100%;
border-radius:10px;
margin-bottom:8px;
}

input{
width:100%;
margin:4px 0;
padding:6px;
border-radius:8px;
border:1px solid #ccc;
font-family:"Comfortaa";
}

.readBtn{
margin-top:10px;
width:100%;
}

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
display:none;
background:rgba(0,0,0,.6);
justify-content:center;
align-items:center;
}

.modalBox{
background:white;
padding:30px;
border-radius:20px;
}

/* мобильная версия */

@media (max-width:700px){

h1{font-size:22px}

.library{
padding:20px;
gap:20px;
}

.card{
width:90%;
max-width:340px;
}

.controls{
flex-direction:column;
align-items:center;
}

.flag{
width:34px;
}

}

</style>
</head>

<body>

<canvas id="bg"></canvas>

<button class="adminBtn" id="adminBtn" onclick="adminLogin()">
Войти как администратор
</button>

<div class="lang">

<img src="https://flagcdn.com/w40/ru.png" class="flag" onclick="setLang('ru')">
<img src="https://flagcdn.com/w40/gb.png" class="flag" onclick="setLang('en')">
<img src="https://flagcdn.com/w40/ua.png" class="flag" onclick="setLang('ua')">

</div>

<header>

<h1 id="welcome"></h1>

</header>

<div class="controls">

<button id="addBtn" onclick="addBook()" style="display:none"></button>

</div>

<div class="library" id="library"></div>

<div class="modal" id="reader">

<div class="modalBox">

<div id="files"></div>
<br>
<button id="closeBtn" onclick="closeReader()"></button>

</div>

</div>

<script>

const ADMIN_PASSWORD="razemake2026"

let currentLang="ru"

let isAdmin=sessionStorage.getItem("razeAdmin")==="true"

let books=JSON.parse(localStorage.getItem("books")||"[]")

const texts={

ru:{
welcome:"Добро пожаловать в онлайн-библиотеку издательства RazeMake!",
admin:"Войти как администратор",
add:"Добавить книгу",
read:"Читать",
close:"Закрыть",
pages:"Кол-во страниц",
langs:"Доступные языки",
illus:"Иллюстрации"
},

en:{
welcome:"Welcome to the RazeMake publishing online library!",
admin:"Admin login",
add:"Add book",
read:"Read",
close:"Close",
pages:"Pages",
langs:"Languages",
illus:"Illustrations"
},

ua:{
welcome:"Ласкаво просимо до онлайн-бібліотеки видавництва RazeMake!",
admin:"Увійти як адміністратор",
add:"Додати книгу",
read:"Читати",
close:"Закрити",
pages:"Кількість сторінок",
langs:"Доступні мови",
illus:"Ілюстрації"
}

}

function updateTexts(){

document.getElementById("welcome").innerText=texts[currentLang].welcome
document.getElementById("adminBtn").innerText=texts[currentLang].admin
document.getElementById("addBtn").innerText=texts[currentLang].add
document.getElementById("closeBtn").innerText=texts[currentLang].close

render()

}

function setLang(l){
currentLang=l
updateTexts()
}

updateTexts()

function save(){
localStorage.setItem("books",JSON.stringify(books))
}

function adminLogin(){

const p=prompt("Password")

if(p===ADMIN_PASSWORD){

isAdmin=true
sessionStorage.setItem("razeAdmin","true")

document.getElementById("addBtn").style.display="inline-block"

render()

}else{

alert("Wrong password")

}

}

if(isAdmin){
document.getElementById("addBtn").style.display="inline-block"
}

function addBook(){

if(!isAdmin) return

books.push({

title:"Новая книга",
pages:"0",
languages:"RU",
illustrations:"Нет",
image:"",
files:["","",""]

})

save()
render()

}

function openReader(files){

let html=""

files.forEach(f=>{
if(f) html+=`<p><a href="${f}" target="_blank">${texts[currentLang].read}</a></p>`
})

document.getElementById("files").innerHTML=html
reader.style.display="flex"

}

function closeReader(){
reader.style.display="none"
}

function render(){

let lib=document.getElementById("library")
lib.innerHTML=""

books.forEach((b,i)=>{

let card=document.createElement("div")
card.className="card"

if(isAdmin){

card.innerHTML=`

<input value="${b.title}" onchange="books[${i}].title=this.value;save()">
<input value="${b.pages}" onchange="books[${i}].pages=this.value;save()">
<input value="${b.languages}" onchange="books[${i}].languages=this.value;save()">
<input value="${b.illustrations}" onchange="books[${i}].illustrations=this.value;save()">

<input placeholder="Image URL" value="${b.image}" onchange="books[${i}].image=this.value;save()">

<input placeholder="File 1" value="${b.files[0]}" onchange="books[${i}].files[0]=this.value;save()">
<input placeholder="File 2" value="${b.files[1]}" onchange="books[${i}].files[1]=this.value;save()">
<input placeholder="File 3" value="${b.files[2]}" onchange="books[${i}].files[2]=this.value;save()">

`

}else{

card.innerHTML=`

<img src="${b.image||'https://picsum.photos/300/400'}">

<h3>${b.title}</h3>

<p>${texts[currentLang].pages}: ${b.pages}</p>
<p>${texts[currentLang].langs}: ${b.languages}</p>
<p>${texts[currentLang].illus}: ${b.illustrations}</p>

<button class="readBtn" onclick='openReader(${JSON.stringify(b.files)})'>
${texts[currentLang].read}
</button>

`

}

lib.appendChild(card)

})

}

render()

</script>

</body>
</html>
