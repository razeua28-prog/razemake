<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RazeMake Library</title>
<link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300;400;700&display=swap" rel="stylesheet">
<style>
body{margin:0;font-family:"Comfortaa",sans-serif;overflow-x:hidden;background:linear-gradient(#f4f4f4,#e9e9e9);}
canvas{position:fixed;top:0;left:0;z-index:-1;}
header{text-align:center;padding:80px 20px;}
h1{font-size:32px;}
.adminBtn{position:absolute;top:20px;left:20px;padding:10px 18px;background:#111;color:white;border:none;border-radius:10px;cursor:pointer;}
.lang{position:absolute;top:20px;right:20px;display:flex;gap:12px;}
.flag{width:64px;cursor:pointer;border-radius:8px;transition:.25s;box-shadow:0 5px 14px rgba(0,0,0,0.2);}
.flag:hover{transform:scale(1.25);}
.controls{display:flex;justify-content:center;margin-bottom:30px;}
button{font-family:"Comfortaa";padding:10px 16px;border:none;border-radius:10px;background:#111;color:white;cursor:pointer;}
.library{display:flex;flex-wrap:wrap;gap:28px;justify-content:center;padding:40px;}
.card{width:260px;background:rgba(255,255,255,0.65);backdrop-filter:blur(16px);border-radius:20px;padding:16px;box-shadow:0 20px 50px rgba(0,0,0,0.1);transition:.3s;}
.card:hover{transform:translateY(-6px);}
.card img{width:100%;border-radius:10px;margin-bottom:10px;}
input{width:100%;margin:4px 0;padding:6px;border-radius:8px;border:1px solid #ccc;font-family:"Comfortaa";}
.readBtn{margin-top:8px;width:100%;}
.deleteBtn{background:#cc3333;margin-top:6px;width:100%;}
.modal{position:fixed;top:0;left:0;width:100%;height:100%;display:none;background:rgba(0,0,0,.6);justify-content:center;align-items:center;}
.modalBox{background:white;padding:30px;border-radius:20px;}
@media(max-width:700px){h1{font-size:22px}.card{width:90%;max-width:340px;}.flag{width:46px;}}
</style>
</head>
<body>

<canvas id="bg"></canvas>

<button class="adminBtn" id="adminBtn" onclick="adminLogin()">Admin</button>

<div class="lang">
<img src="https://flagcdn.com/w80/ru.png" class="flag" onclick="setLang('ru')">
<img src="https://flagcdn.com/w80/gb.png" class="flag" onclick="setLang('en')">
<img src="https://flagcdn.com/w80/ua.png" class="flag" onclick="setLang('ua')">
</div>

<header>
<h1 id="welcome">Добро пожаловать в библиотеку RazeMake</h1>
</header>

<div class="controls">
<button id="addBtn" onclick="addBook()" style="display:none">Добавить книгу</button>
</div>

<div class="library" id="library"></div>

<div class="modal" id="reader">
<div class="modalBox">
<div id="files"></div><br>
<button onclick="closeReader()">Закрыть</button>
</div>
</div>

<script>
// ------------------ Настройки GitHub ------------------
const GITHUB_REPO="USERNAME/REPO"; // замени на свой GitHub репозиторий
const GITHUB_TOKEN="YOUR_PERSONAL_TOKEN"; // токен с доступом к репо
const JSON_FILE="books.json";

// ------------------ Языки ------------------
let currentLang="ru";
let isAdmin=false;
let books=[];

const texts={
  ru:{welcome:"Добро пожаловать в онлайн-библиотеку RazeMake!",admin:"Войти как администратор",add:"Добавить книгу",read:"Читать",close:"Закрыть",pages:"Кол-во страниц",langs:"Доступные языки",illus:"Иллюстрации"},
  en:{welcome:"Welcome to RazeMake online library!",admin:"Admin login",add:"Add book",read:"Read",close:"Close",pages:"Pages",langs:"Languages",illus:"Illustrations"},
  ua:{welcome:"Ласкаво просимо до онлайн-бібліотеки RazeMake!",admin:"Увійти як адміністратор",add:"Додати книгу",read:"Читати",close:"Закрити",pages:"Кількість сторінок",langs:"Доступні мови",illus:"Ілюстрації"}
};

function updateTexts(){
  document.getElementById("welcome").innerText=texts[currentLang].welcome;
  document.getElementById("adminBtn").innerText=texts[currentLang].admin;
  document.getElementById("addBtn").innerText=texts[currentLang].add;
  render();
}

function setLang(l){currentLang=l;updateTexts();}

// ------------------ Админ ------------------
function adminLogin(){
  const p=prompt("Password");
  if(p==="razemake"){ // пароль можно менять
    isAdmin=true;
    document.getElementById("addBtn").style.display="inline-block";
    render();
  }else{alert("Wrong password");}
}

// ------------------ Работа с книгами ------------------
function save(){
  localStorage.setItem("books",JSON.stringify(books));
  // Тут можно добавить GitHub API вызов для сохранения всех изменений
}

function addBook(){
  if(!isAdmin) return;
  books.push({title:"New Book",pages:"0",languages:"RU",illustrations:"No",image:"",files:[""]});
  save(); render();
}

function deleteBook(i){
  if(!isAdmin) return;
  books.splice(i,1); save(); render();
}

function openReader(files){
  let html="";
  files.forEach(f=>{if(f) html+=`<p><a href="${f}" target="_blank">${texts[currentLang].read}</a></p>`});
  document.getElementById("files").innerHTML=html;
  document.getElementById("reader").style.display="flex";
}

function closeReader(){document.getElementById("reader").style.display="none";}

function render(){
  let lib=document.getElementById("library"); lib.innerHTML="";
  books.forEach((b,i)=>{
    let card=document.createElement("div"); card.className="card";
    if(isAdmin){
      card.innerHTML=`
        <input value="${b.title}" onchange="books[${i}].title=this.value;save()">
        <input value="${b.pages}" onchange="books[${i}].pages=this.value;save()">
        <input value="${b.languages}" onchange="books[${i}].languages=this.value;save()">
        <input value="${b.illustrations}" onchange="books[${i}].illustrations=this.value;save()">
        <input placeholder="Image URL" value="${b.image}" onchange="books[${i}].image=this.value;save()">
        <input placeholder="Book file link" value="${b.files[0]}" onchange="books[${i}].files[0]=this.value;save()">
        <button class="deleteBtn" onclick="deleteBook(${i})">Delete</button>
      `;
    }else{
      card.innerHTML=`
        <img src="${b.image||'https://picsum.photos/300/400'}">
        <h3>${b.title}</h3>
        <p>${texts[currentLang].pages}: ${b.pages}</p>
        <p>${texts[currentLang].langs}: ${b.languages}</p>
        <p>${texts[currentLang].illus}: ${b.illustrations}</p>
        <button class="readBtn" onclick='openReader(${JSON.stringify(b.files)})'>${texts[currentLang].read}</button>
      `;
    }
    lib.appendChild(card);
  });
}

// ------------------ Фигуры на фоне ------------------
const canvas=document.getElementById("bg");
const ctx=canvas.getContext("2d");
function resize(){canvas.width=window.innerWidth; canvas.height=window.innerHeight;}
resize(); window.addEventListener("resize",resize);
let shapes=[]; for(let i=0;i<80;i++){
  shapes.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,size:16+Math.random()*24,vx:(Math.random()-0.5)*1.2,vy:(Math.random()-0.5)*1.2,type:Math.floor(Math.random()*3)});
}
let mouse={x:0,y:0};
document.addEventListener("mousemove",e=>{mouse.x=e.clientX; mouse.y=e.clientY;});
function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  shapes.forEach(s=>{
    let dx=s.x-mouse.x, dy=s.y-mouse.y;
    let dist=Math.sqrt(dx*dx+dy*dy);
    if(dist<200){s.vx+=dx*0.003; s.vy+=dy*0.003;}
    s.x+=s.vx; s.y+=s.vy;
    if(s.x<0||s.x>canvas.width)s.vx*=-1;
    if(s.y<0||s.y>canvas.height)s.vy*=-1;
    const colors=["rgba(0,0,0,0.08)","rgba(120,120,120,0.06)","rgba(80,80,80,0.05)","rgba(160,160,160,0.05)"];
    ctx.fillStyle=colors[s.type];
    ctx.beginPath();
    if(s.type===0) ctx.arc(s.x,s.y,s.size,0,Math.PI*2);
    if(s.type===1) ctx.rect(s.x,s.y,s.size,s.size);
    if(s.type===2){ctx.moveTo(s.x,s.y); ctx.lineTo(s.x+s.size,s.y); ctx.lineTo(s.x+s.size/2,s.y+s.size); ctx.closePath();}
    ctx.fill();
  });
  requestAnimationFrame(draw);
}
draw();

updateTexts();
render();
</script>

</body>
</html>
