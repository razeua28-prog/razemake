<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>RazeMake Library</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300;400;600&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/epubjs/dist/epub.min.js"></script>

</head>

<body>

<div class="topGlow"></div>

<div id="bg3d"></div>

<button id="adminBtn">Admin</button>

<div class="flags">

<img src="https://flagcdn.com/w80/gb.png" data-lang="en">
<img src="https://flagcdn.com/w80/ru.png" data-lang="ru">
<img src="https://flagcdn.com/w80/ua.png" data-lang="ua">

</div>

<header>

<h1 id="welcome"></h1>

<input id="search" placeholder="Search books">

<div class="categories">

<button onclick="filterCategory('all')">All</button>
<button onclick="filterCategory('poetry')">Poetry</button>
<button onclick="filterCategory('novel')">Novels</button>

</div>

</header>

<section id="books"></section>

<div id="reader" class="modal">

<div class="modalBox">

<div id="fileList"></div>

<div id="viewer"></div>

<button onclick="closeReader()">Close</button>

</div>

</div>

<div id="adminPanel" class="modal">

<div class="modalBox">

<h2>Admin Panel</h2>

<input id="bookTitle" placeholder="Title">
<input id="bookPages" placeholder="Pages">
<input id="bookCategory" placeholder="Category">
<input id="bookImage" placeholder="Cover URL">

<input id="ruLink" placeholder="Russian link">
<input id="enLink" placeholder="English link">
<input id="uaLink" placeholder="Ukrainian link">

<button onclick="addBook()">Add Book</button>

<div id="adminBooks"></div>

<button onclick="closeAdmin()">Close</button>

</div>

</div>

<script src="app.js"></script>
<script src="background.js"></script>
<script src="admin.js"></script>
<script src="github.js"></script>

</body>
</html>
